version: '3.8'

services:
  # MongoDB Service
  mongodb:
    image: mongo:latest
    container_name: walmart_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Hadoop Namenode
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    restart: always
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    environment:
      - CLUSTER_NAME=walmart_test
    env_file:
      - ./hadoop.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Hadoop Datanode
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    restart: always
    ports:
      - "9864:9864"
    environment:
      - SERVICE_PRECONDITION=namenode:9870
    env_file:
      - ./hadoop.env
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    depends_on:
      namenode:
        condition: service_healthy

  # Data Upload Service - Automatically uploads preprocessed data to HDFS and MongoDB
  data-upload:
    image: jupyter/pyspark-notebook:latest
    container_name: walmart_data_upload
    user: root
    volumes:
      - .:/app
      - hadoop_namenode:/hadoop/dfs/name
    working_dir: /app
    environment:
      - HADOOP_USER_NAME=root
      - MONGO_URI=mongodb://mongodb:27017
    command: >
      /bin/sh -c "
        echo 'Installing dependencies...' &&
        pip install pandas pymongo hdfs -q &&
        echo 'Waiting for services to be ready...' &&
        sleep 30 &&
        echo 'Uploading preprocessed data to HDFS...' &&
        python hdfs_upload/hdfs_upload.py --preprocessed-dir ./data/preprocessed --method webhdfs --hdfs-host namenode --hdfs-port 9870 &&
        echo 'Loading preprocessed data into MongoDB...' &&
        python mongodb_load/mongodb_data_load.py --preprocessed --local-dir ./data/preprocessed --mongo-uri mongodb://mongodb:27017 &&
        echo 'Data upload complete!' &&
        sleep infinity
      "
    depends_on:
      mongodb:
        condition: service_healthy
      namenode:
        condition: service_healthy
      datanode:
        condition: service_started

  tester:
    image: jupyter/pyspark-notebook:latest
    container_name: walmart_tester
    user: root
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - HADOOP_USER_NAME=root
      # Data source configuration for sales_forecasting.py
      - DATA_SOURCE=mongodb
      - MONGO_URI=mongodb://mongodb:27017
      - DB_NAME=walmart_sales
      - HDFS_HOST=namenode
      - HDFS_PORT=9870
      - HDFS_BASE=/user/walmart_sales
    command: /bin/sh -c "pip install pandas pymongo hdfs scikit-learn xgboost matplotlib seaborn -i https://pypi.tuna.tsinghua.edu.cn/simple && sleep infinity"
    depends_on:
      data-upload:
        condition: service_started

volumes:
  mongodb_data:
  hadoop_namenode:
  hadoop_datanode:
